name: SonarCloud
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          java-version: 17
          distribution: 'zulu' # Alternative distribution options are available.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Cache SonarQube Cloud packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner
      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner
      - name: Begin SonarCloud analysis
        env:
          # El SonarScanner for .NET lee SONAR_TOKEN del entorno automáticamente. Pasarlo por `env:`
          # (y NO expandirlo dentro del `run:`) cumple S7636; en PowerShell las env vars son $env:VAR.
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        # sonar.cs.opencover.reportsPaths: reportes de cobertura (formato OpenCover, el que lee el
        # plugin de C#). sonar.coverage.exclusions: espeja lo que coverlet excluye (Program.cs por
        # ExcludeByFile y los adaptadores Mongo con [ExcludeFromCodeCoverage]) para que el % coincida.
        run: |
          ${{ runner.temp }}\scanner\dotnet-sonarscanner begin /k:"jasonfabian8_JYDE.OpenDataCopilot" /o:"jasonfabian8" /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml" /d:sonar.coverage.exclusions="**/Program.cs,**/Mongo/MongoContext.cs,**/Mongo/MongoCatalogRepository.cs,**/Mongo/MongoDatasetSearchIndex.cs,**/Mongo/DatasetVectorDocument.cs"
      - name: Build and test with coverage
        shell: powershell
        # `dotnet test` compila (lo que dispara el análisis de Sonar) y recolecta cobertura OpenCover
        # por proyecto (tests/*/coverage.opencover.xml). Respeta el umbral >=95% de Directory.Build.props.
        run: dotnet test /p:CollectCoverage=true /p:CoverletOutputFormat=opencover
      - name: End SonarCloud analysis
        if: always()  # sube el análisis y la cobertura aunque el umbral de cobertura falle
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: ${{ runner.temp }}\scanner\dotnet-sonarscanner end
